name: Release

# Cut a release by pushing a version tag:
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.3.0"
        required: true

permissions:
  contents: write   # create releases

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Xcode project
        run: brew install xcodegen && (cd src && xcodegen generate)

      # Import the stable self-signed cert (if configured) so releases share one code
      # "designated requirement" — that keeps users' Accessibility grant (click-through /
      # scroll-through) across updates. Without the secret, falls back to ad-hoc.
      - name: Set up code signing
        id: signing
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "No MACOS_CERT_P12 secret — building ad-hoc (Accessibility grant resets on each update)."
            echo "identity=-" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make the new keychain searchable for codesign alongside the existing ones.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          HASH="$(security find-identity -p codesigning "$KEYCHAIN" | grep 'EasyPresent Self-Signed' | head -1 | awk '{print $2}')"
          rm -f "$RUNNER_TEMP/cert.p12"
          if [ -z "$HASH" ]; then echo "cert imported but identity not found"; exit 1; fi
          echo "identity=$HASH" >> "$GITHUB_OUTPUT"

      - name: Build (Release)
        run: |
          xcodebuild -project src/EasyPresent.xcodeproj -scheme EasyPresent -configuration Release \
            -derivedDataPath build-release \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.identity }}" CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_HARDENED_RUNTIME=NO \
            build

      - name: Package DMG
        id: dmg
        run: |
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          STAGE="$(mktemp -d)"
          cp -R build-release/Build/Products/Release/EasyPresent.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname EasyPresent -srcfolder "$STAGE" -ov -format UDZO "dist/EasyPresent-v$V.dmg"
          echo "sha=$(shasum -a 256 "dist/EasyPresent-v$V.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          gh release create "v$V" "dist/EasyPresent-v$V.dmg" --repo "${{ github.repository }}" \
            --title "EasyPresent v$V" \
            --notes "Update: \`brew update && brew upgrade easypresent\` — or download the DMG below." \
            || gh release upload "v$V" "dist/EasyPresent-v$V.dmg" --repo "${{ github.repository }}" --clobber

      - name: Bump Homebrew cask
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_DEPLOY_KEY" ]; then
            echo "No TAP_DEPLOY_KEY secret set — skipping cask bump. (Add a write-scoped deploy key to auto-update the tap.)"
            exit 0
          fi
          V="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.dmg.outputs.sha }}"

          # Use a deploy key scoped to the tap repo only (no broad token).
          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy
          chmod 600 ~/.ssh/tap_deploy
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy -o IdentitiesOnly=yes"

          git clone "git@github.com:josiahcoad/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/^  version \".*\"/  version \"$V\"/" Casks/easypresent.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA\"/" Casks/easypresent.rb
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -aqm "easypresent $V"
          git push -q
          rm -f ~/.ssh/tap_deploy
