name: EasyPresent
options:
  bundleIdPrefix: com.josiahcoad
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: true

targets:
  EasyPresent:
    type: application
    platform: macOS
    sources:
      - path: EasyPresent
    settings:
      base:
        INFOPLIST_FILE: EasyPresent/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: EasyPresent
        PRODUCT_BUNDLE_IDENTIFIER: com.josiahcoad.EasyPresent
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: T74PC5F324

  EasyPresentTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EasyPresentTests
    dependencies:
      - target: EasyPresent
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EasyPresent.app/Contents/MacOS/EasyPresent"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: T74PC5F324
